name: Build and Publish Docker Images

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set-matrix.outputs.images }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed image folders
        id: changed
        uses: dorny/paths-filter@de90cc6fb38f6f4c4143a0882a3de4f640a0b904 # v3.0.2
        with:
          filters: |
            jenkins-agent:
              - 'jenkins-agent/**'
            node25-trixie-with-jdk25:
              - 'node25-trixie-with-jdk25/**'

      - name: Build dynamic matrix
        id: set-matrix
        run: |
          matrix='{"include":['
          separator=''
          has_changes='false'
          if [[ "${{ steps.changed.outputs['jenkins-agent'] }}" == "true" ]]; then
            matrix+="${separator}{\"folder\":\"jenkins-agent\",\"image_name\":\"rafaelurben/jenkins-agent\"}"
            separator=','
            has_changes='true'
          fi
          if [[ "${{ steps.changed.outputs['node25-trixie-with-jdk25'] }}" == "true" ]]; then
            matrix+="${separator}{\"folder\":\"node25-trixie-with-jdk25\",\"image_name\":\"rafaelurben/node25-trixie-with-jdk25\"}"
            separator=','
            has_changes='true'
          fi
          matrix+=']}'

          echo "images=${matrix}" >> "$GITHUB_OUTPUT"
          echo "has_changes=${has_changes}" >> "$GITHUB_OUTPUT"

  build-and-publish:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    strategy:
      fail-fast: false 
      matrix: ${{ fromJSON(needs.detect-changes.outputs.images) }}
 
    env:
      REGISTRY: ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image_name }}
          tags: |
            latest
            ${{ github.sha }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./${{ matrix.folder }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
